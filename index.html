<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F7F4EF;--white:#fff;--charcoal:#1A1A1A;--gray:#6B6560;
  --border:#E4DED7;--accent:#C0622A;--gold:#B89140;--green:#3D7A52;--blue:#2B6CB0;
  --purple:#6B46C1;--teal:#0D7377;
  --rank1:#C0622A;--rank2:#B89140;--rank3:#3D7A52;
  --son:#F5A623;--soff:#DDD8D2;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--charcoal);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.6;}

/* MAP */
.map-wrap{position:relative;width:100%;height:62vh;min-height:380px;}
#naver-map{width:100%;height:100%;}
.map-title{position:absolute;top:16px;left:16px;background:rgba(26,26,26,.88);backdrop-filter:blur(8px);color:#fff;padding:9px 16px;border-radius:8px;font-family:'Noto Serif KR',serif;font-size:14px;z-index:10;pointer-events:none;}
.map-fallback{position:absolute;inset:0;background:#EDE9E3;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--gray);font-size:13px;text-align:center;padding:24px;z-index:5;}
.map-fallback strong{color:var(--accent);font-size:15px;display:block;}
.map-fallback code{background:rgba(0,0,0,.07);padding:2px 7px;border-radius:4px;font-family:monospace;font-size:12px;}

/* MAIN */
.main{max-width:1060px;margin:0 auto;padding:28px 18px 80px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px;}
.top-bar h2{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:400;}
.sort-wrap{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--gray);}
.sort-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer;color:var(--gray);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.sort-btn.on{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
.data-note{font-size:11px;color:#aaa;margin-bottom:18px;}

/* CARD */
.cards{display:grid;gap:22px;}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .2s;position:relative;}
.card:hover{box-shadow:0 10px 36px rgba(0,0,0,.09);transform:translateY(-1px);}
.card.r1{border-color:var(--rank1);box-shadow:0 0 0 1.5px var(--rank1),0 4px 20px rgba(192,98,42,.13);}
.card.r2{border-color:var(--rank2);box-shadow:0 0 0 1.5px var(--rank2),0 4px 20px rgba(184,145,64,.11);}
.card.r3{border-color:var(--rank3);box-shadow:0 0 0 1.5px var(--rank3),0 4px 20px rgba(61,122,82,.11);}
.rank-badge{position:absolute;top:10px;left:10px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;z-index:5;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.r1 .rank-badge{background:var(--rank1);}
.r2 .rank-badge{background:var(--rank2);}
.r3 .rank-badge{background:var(--rank3);}

/* apt image */
.apt-img-wrap{position:relative;height:160px;overflow:hidden;background:#E0DBD4;}
.apt-img{width:100%;height:160px;object-fit:cover;display:block;}
.apt-img-overlay{position:absolute;bottom:0;left:0;right:0;height:64px;background:linear-gradient(transparent,rgba(0,0,0,.5));pointer-events:none;}
.apt-img-label{position:absolute;bottom:10px;right:12px;font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.3px;}
.apt-kb-link{position:absolute;bottom:10px;left:12px;font-size:10px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.35);padding:3px 8px;border-radius:100px;text-decoration:none;transition:background .15s;}
.apt-kb-link:hover{background:rgba(0,0,0,.6);}

/* card head */
.c-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.c-idx{width:22px;height:22px;border-radius:50%;background:var(--charcoal);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;}
.c-name{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;margin-bottom:2px;}
.c-loc{font-size:11px;color:var(--gray);}
.c-station{font-size:11px;color:var(--blue);margin-top:2px;}

/* info */
.c-info{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
.i-cell{padding:9px 13px;border-right:1px solid var(--border);}
.i-cell:last-child{border-right:none;}
.i-lbl{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:2px;}
.i-val{font-weight:500;font-size:12px;}

/* school */
.c-school{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.school-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.school-name{font-size:12px;font-weight:500;}
.school-achievement{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;margin-left:2px;}
.ach-high{background:#D1FAE5;color:#065F46;}
.ach-mid-high{background:#DBEAFE;color:#1E3A5F;}
.ach-mid{background:#FEF3C7;color:#78350F;}
.ach-low{background:#FEE2E2;color:#7F1D1D;}

/* price */
.c-price{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.p-block{padding:10px 13px;border-right:1px solid var(--border);}
.p-block:last-child{border-right:none;}
.p-type{font-size:9px;color:var(--gray);font-weight:600;letter-spacing:.5px;margin-bottom:5px;}
.p-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.p-row span:first-child{color:var(--gray);}
.p-low{color:var(--blue);font-weight:600;}

/* commute — 2 panels */
.c-commute{border-bottom:1px solid var(--border);}
.commute-tabs{display:flex;border-bottom:1px solid var(--border);}
.ctab{flex:1;padding:7px 0;font-size:10px;text-align:center;cursor:pointer;color:var(--gray);background:var(--bg);border-right:1px solid var(--border);transition:all .15s;}
.ctab:last-child{border-right:none;}
.ctab.on{background:#fff;color:var(--charcoal);font-weight:600;}
.commute-panel{display:none;padding:11px 13px;}
.commute-panel.on{display:block;}
.ct-title{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:8px;font-weight:500;}
.ct-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.ct-grid-wide{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.ct-item{background:var(--bg);border-radius:7px;padding:7px 9px;}
.ct-dest{font-size:9px;font-weight:600;color:var(--charcoal);margin-bottom:4px;}
.ct-rows{display:flex;flex-direction:column;gap:3px;}
.ct-row{display:flex;align-items:center;gap:3px;font-size:10px;}
.ct-row-lbl{color:var(--gray);width:22px;font-size:9px;flex-shrink:0;}
.t-bus{color:var(--blue);font-weight:600;}
.t-car{color:var(--green);font-weight:600;}
.ct-dot{color:#ddd;font-size:9px;}

/* infra */
.c-infra{border-bottom:1px solid var(--border);padding:11px 13px;}
.infra-title{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:8px;font-weight:500;}
.infra-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.infra-item{background:var(--bg);border-radius:7px;padding:7px 9px;}
.infra-type{font-size:9px;color:var(--gray);margin-bottom:2px;}
.infra-name{font-size:11px;font-weight:600;margin-bottom:2px;}
.infra-dist{font-size:10px;color:var(--green);}
.infra-car{font-size:10px;color:var(--gray);}

/* star rating */
.c-rating{padding:13px 13px 0;}
.r-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.r-who{font-size:11px;color:var(--gray);width:30px;flex-shrink:0;font-weight:500;}
.r-who.avg{color:var(--charcoal);font-weight:700;}
.stars{display:flex;gap:2px;}
.star{display:inline-block;width:18px;height:18px;cursor:pointer;position:relative;flex-shrink:0;}
.star svg{width:18px;height:18px;pointer-events:none;display:block;}
.avg-stars .star{cursor:default;}
.r-val{font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;color:var(--accent);width:28px;text-align:right;flex-shrink:0;}
.r-val.avg{color:var(--gold);font-size:14px;}
.avg-div{border:none;border-top:1px dashed var(--border);margin:3px 0 9px;}

/* comment */
.c-comment{padding:9px 13px 14px;}
.cm-lbl{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:6px;}
.cm-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.cm-wrap{display:flex;flex-direction:column;gap:2px;}
.cm-who{font-size:9px;color:var(--gray);font-weight:500;}
textarea.cm-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--charcoal);outline:none;resize:none;transition:border-color .15s;}
textarea.cm-input:focus{border-color:var(--accent);background:#fff;}
textarea.cm-input::placeholder{color:#c5c0ba;}

@media(max-width:640px){
  .c-info{grid-template-columns:1fr 1fr;}
  .ct-grid,.ct-grid-wide{grid-template-columns:1fr 1fr;}
  .infra-grid{grid-template-columns:1fr 1fr;}
  .cm-grid{grid-template-columns:1fr;}
  .map-wrap{height:50vh;}
  .apt-img{height:130px;}
}

const ratings = {};
APTS.forEach(a => { ratings[a.id] = {jw:0, hy:0}; });
const PTS = '12,2.5 14.8,8.9 21.7,9.8 16.9,14.4 18.2,21.2 12,17.9 5.8,21.2 7.1,14.4 2.3,9.8 9.2,8.9';

function starSVG(f) {
  const on='#F5A623', off='#DDD8D2';
  if(f===1) return `<svg viewBox="0 0 24 24"><polygon points="${PTS}" fill="${on}" stroke="${on}" stroke-width=".4"/></svg>`;
  if(f===.5){const id='h'+(Math.random()*1e6|0);return `<svg viewBox="0 0 24 24"><defs><clipPath id="${id}"><rect x="0" y="0" width="12" height="24"/></clipPath></defs><polygon points="${PTS}" fill="${off}" stroke="${off}" stroke-width=".4"/><polygon points="${PTS}" fill="${on}" stroke="${on}" stroke-width=".4" clip-path="url(#${id})"/></svg>`;}
  return `<svg viewBox="0 0 24 24"><polygon points="${PTS}" fill="${off}" stroke="${off}" stroke-width=".4"/></svg>`;
}

function renderStars(el, val, n) {
  el.innerHTML='';
  for(let i=1;i<=n;i++){
    const f = val>=i?1:val>=i-.5?.5:0;
    const s=document.createElement('span');
    s.className='star'; s.dataset.star=i;
    s.innerHTML=starSVG(f);
    el.appendChild(s);
  }
}

function initStars(el, aptId, who) {
  renderStars(el, 0, 10);
  el.addEventListener('mousemove', e=>{
    const s=e.target.closest('[data-star]'); if(!s) return;
    const i=parseInt(s.dataset.star);
    const r=s.getBoundingClientRect();
    renderStars(el, e.clientX<r.left+r.width/2?i-.5:i, 10);
  });
  el.addEventListener('mouseleave', ()=>renderStars(el, ratings[aptId][who], 10));
  el.addEventListener('click', e=>{
    const s=e.target.closest('[data-star]'); if(!s) return;
    const i=parseInt(s.dataset.star);
    const r=s.getBoundingClientRect();
    const nv=e.clientX<r.left+r.width/2?i-.5:i;
    ratings[aptId][who]=ratings[aptId][who]===nv?0:nv;
    renderStars(el, ratings[aptId][who], 10);
    refreshRating(aptId);
    if(curSort==='rating') sortCards('rating',false);
  });
}

function refreshRating(id) {
  const {jw,hy}=ratings[id];
  const jv=document.getElementById(`v-${id}-jw`);
  const hv=document.getElementById(`v-${id}-hy`);
  const av=document.getElementById(`v-${id}-av`);
  const as=document.getElementById(`s-${id}-av`);
  if(jv) jv.textContent=jw>0?jw.toFixed(1):'-';
  if(hv) hv.textContent=hy>0?hy.toFixed(1):'-';
  const both=jw>0&&hy>0;
  const avg=both?Math.round((jw+hy)*2)/4:(jw||hy||0);
  if(av) av.textContent=(jw>0||hy>0)?avg.toFixed(1):'-';
  if(as) renderStars(as, avg, 10);
  updateRanks();
}

function getAvg(id){const{jw,hy}=ratings[id];if(jw>0&&hy>0)return(jw+hy)/2;return jw||hy||0;}

function updateRanks(){
  APTS.forEach(a=>{
    const c=document.getElementById(`card-${a.id}`);if(!c)return;
    c.classList.remove('r1','r2','r3');
    const b=c.querySelector('.rank-badge');if(b)b.remove();
  });
  [...APTS].filter(a=>getAvg(a.id)>0).sort((a,b)=>getAvg(b.id)-getAvg(a.id)).slice(0,3).forEach((a,i)=>{
    const c=document.getElementById(`card-${a.id}`);if(!c)return;
    c.classList.add('r'+(i+1));
    const b=document.createElement('div');b.className='rank-badge';b.textContent=i+1;c.appendChild(b);
  });
}

// tab switch
function switchTab(el, panelId, aptId) {
  const card = document.getElementById(`card-${aptId}`);

}

let curSort='rating';
function sortCards(type, updBtn=true){
  curSort=type;
  if(updBtn) document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===type));
  const wrap=document.getElementById('cards');
  const order=type==='rating'
    ?[...APTS].sort((a,b)=>{const ra=getAvg(a.id),rb=getAvg(b.id);if(!ra&&!rb)return APTS.indexOf(a)-APTS.indexOf(b);if(!ra)return 1;if(!rb)return -1;return rb-ra;})
    :APTS;
  order.forEach((apt,i)=>{
    const c=document.getElementById(`card-${apt.id}`);
    const ix=c.querySelector(`#idx-${apt.id}`);
    if(ix) ix.textContent=i+1;
    wrap.appendChild(c);
  });
}

  APTS.forEach(apt=>{
    initStars(document.getElementById(`s-${apt.id}-jw`),apt.id,'jw');
    initStars(document.getElementById(`s-${apt.id}-hy`),apt.id,'hy');
    renderStars(document.getElementById(`s-${apt.id}-av`),0,10);
  });
}
init();

// ═══════════════════════════════════════════════════════
// 네이버 지도
// ═══════════════════════════════════════════════════════
function initMap(){
  if(typeof naver==='undefined'||typeof naver.maps==='undefined'){document.getElementById('map-fallback').style.display='flex';return;}
  const bounds=new naver.maps.LatLngBounds();
  APTS.forEach(a=>bounds.extend(new naver.maps.LatLng(a.lat,a.lng)));
  const map=new naver.maps.Map('naver-map',{bounds,mapTypeControl:false,scaleControl:false,logoControl:true,mapDataControl:false});
  const iws=[];
  APTS.forEach((apt,i)=>{
    const marker=new naver.maps.Marker({
      position:new naver.maps.LatLng(apt.lat,apt.lng),map,
      icon:{content:`<div style="background:#1A1A1A;color:#fff;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:500;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.28);cursor:pointer;position:relative;"><span style="color:#F5A623;margin-right:3px;">${i+1}</span>${apt.name}<div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1A1A1A;border-bottom:none;"></div></div>`,anchor:new naver.maps.Point(55,28)},
    });
    const iw=new naver.maps.InfoWindow({
      content:`<div style="padding:13px 15px;font-family:'Noto Sans KR',sans-serif;min-width:185px;border-radius:10px;"><div style="font-size:13px;font-weight:700;margin-bottom:2px;">${apt.name}</div><div style="font-size:10px;color:#888;margin-bottom:6px;">${apt.station}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><div style="background:#F7F4EF;border-radius:6px;padding:6px 8px;"><div style="font-size:9px;color:#888;margin-bottom:2px;">59㎡</div><div style="font-size:13px;font-weight:700;color:#C0622A;">${apt.p59.r}</div></div><div style="background:#F7F4EF;border-radius:6px;padding:6px 8px;"><div style="font-size:9px;color:#888;margin-bottom:2px;">84㎡</div><div style="font-size:13px;font-weight:700;color:#C0622A;">${apt.p84.r}</div></div></div></div>`,
      borderWidth:0,backgroundColor:'#fff',borderRadius:'12px',boxShadow:'0 6px 24px rgba(0,0,0,.14)',pixelOffset:new naver.maps.Point(0,-10),disableAnchor:true,
    });
    iws.push(iw);
    naver.maps.Event.addListener(marker,'click',()=>{iws.forEach((w,j)=>{if(j!==i)w.close();});iw.getMap()?iw.close():iw.open(map,marker);});
  });
}
window.addEventListener('load',initMap);
</script>
</body>
