<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재원 & 희영 신혼집 찾기 프로젝트 </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F4EF;--white:#fff;--charcoal:#1A1A1A;--gray:#6B6560;
  --border:#E4DED7;--accent:#C0622A;--gold:#B89140;--green:#3D7A52;--blue:#2B6CB0;
  --purple:#6B46C1;--teal:#0D7377;
  --rank1:#C0622A;--rank2:#B89140;--rank3:#3D7A52;
  --son:#F5A623;--soff:#DDD8D2;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--charcoal);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.6;}

/* MAP */
.map-wrap{position:relative;width:100%;height:62vh;min-height:380px;}
#naver-map{width:100%;height:100%;}
.map-title{position:absolute;top:16px;left:16px;background:rgba(26,26,26,.88);backdrop-filter:blur(8px);color:#fff;padding:9px 16px;border-radius:8px;font-family:'Noto Serif KR',serif;font-size:14px;z-index:10;pointer-events:none;}
.map-fallback{position:absolute;inset:0;background:#EDE9E3;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--gray);font-size:13px;text-align:center;padding:24px;z-index:5;}
.map-fallback strong{color:var(--accent);font-size:15px;display:block;}
.map-fallback code{background:rgba(0,0,0,.07);padding:2px 7px;border-radius:4px;font-family:monospace;font-size:12px;}

/* MAIN */
.main{max-width:1060px;margin:0 auto;padding:28px 18px 80px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px;}
.top-bar h2{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:400;}
.sort-wrap{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--gray);}
.sort-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer;color:var(--gray);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.sort-btn.on{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
.data-note{font-size:11px;color:#aaa;margin-bottom:18px;}

/* CARD */
.cards{display:grid;gap:22px;}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .2s;position:relative;}
.card:hover{box-shadow:0 10px 36px rgba(0,0,0,.09);transform:translateY(-1px);}
.card.r1{border-color:var(--rank1);box-shadow:0 0 0 1.5px var(--rank1),0 4px 20px rgba(192,98,42,.13);}
.card.r2{border-color:var(--rank2);box-shadow:0 0 0 1.5px var(--rank2),0 4px 20px rgba(184,145,64,.11);}
.card.r3{border-color:var(--rank3);box-shadow:0 0 0 1.5px var(--rank3),0 4px 20px rgba(61,122,82,.11);}
.rank-badge{position:absolute;top:10px;left:10px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;z-index:5;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.r1 .rank-badge{background:var(--rank1);}
.r2 .rank-badge{background:var(--rank2);}
.r3 .rank-badge{background:var(--rank3);}

/* apt image */
.apt-img-wrap{position:relative;height:160px;overflow:hidden;background:#E0DBD4;}
.apt-img{width:100%;height:160px;object-fit:cover;display:block;}
.apt-img-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EDE9E3,#E0DBD4);}
.apt-img-overlay{position:absolute;bottom:0;left:0;right:0;height:64px;background:linear-gradient(transparent,rgba(0,0,0,.5));pointer-events:none;}
.apt-img-label{position:absolute;bottom:10px;right:12px;font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.3px;}
.apt-kb-link{position:absolute;bottom:10px;left:12px;font-size:10px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.35);padding:3px 8px;border-radius:100px;text-decoration:none;transition:background .15s;}
.apt-kb-link:hover{background:rgba(0,0,0,.6);}

/* card head */
.c-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.c-idx{width:22px;height:22px;border-radius:50%;background:var(--charcoal);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;}
.c-name{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;margin-bottom:2px;}
.c-loc{font-size:11px;color:var(--gray);}
.c-station{font-size:11px;color:var(--blue);margin-top:2px;}

/* info */
.c-info{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
.i-cell{padding:9px 13px;border-right:1px solid var(--border);}
.i-cell:last-child{border-right:none;}
.i-lbl{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:2px;}
.i-val{font-weight:500;font-size:12px;}

/* school */
.c-school{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.school-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.school-name{font-size:12px;font-weight:500;}
.school-achievement{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;margin-left:2px;}
.ach-high{background:#D1FAE5;color:#065F46;}
.ach-mid-high{background:#DBEAFE;color:#1E3A5F;}
.ach-mid{background:#FEF3C7;color:#78350F;}
.ach-low{background:#FEE2E2;color:#7F1D1D;}

/* price */
.c-price{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.p-block{padding:10px 13px;border-right:1px solid var(--border);}
.p-block:last-child{border-right:none;}
.p-type{font-size:9px;color:var(--gray);font-weight:600;letter-spacing:.5px;margin-bottom:5px;}
.p-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.p-row span:first-child{color:var(--gray);}
.p-low{color:var(--blue);font-weight:600;}

/* price check link */
.p-check a{color:var(--blue);font-size:11px;font-weight:600;text-decoration:none;}
.p-check a:hover{text-decoration:underline;}

/* listing badges */
.p-row-listing{align-items:center;}
.listing-badges{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.l-min,.l-max{font-size:12px;font-weight:700;color:var(--blue);}
.l-wave{font-size:11px;color:var(--gray);}
.l-count{font-size:10px;color:var(--gray);background:var(--border);padding:1px 6px;border-radius:100px;margin-left:2px;}
.l-empty{font-size:11px;color:var(--blue);cursor:pointer;border:1px dashed var(--blue);padding:1px 8px;border-radius:100px;opacity:.7;transition:opacity .15s;}
.l-empty:hover{opacity:1;}
.listing-badges:not(.has-data){cursor:pointer;}
.listing-edit-btn{font-size:10px;color:var(--gray);cursor:pointer;margin-left:4px;opacity:.6;transition:opacity .15s;}
.listing-edit-btn:hover{opacity:1;}

/* listing modal */
.listing-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;}
.listing-modal{background:#fff;border-radius:14px;padding:24px;width:min(340px,90vw);box-shadow:0 16px 48px rgba(0,0,0,.2);}
.lm-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;margin-bottom:4px;}
.lm-sub{font-size:11px;color:var(--gray);margin-bottom:18px;}
.lm-field{margin-bottom:14px;}
.lm-label{font-size:11px;color:var(--gray);margin-bottom:5px;display:block;}
.lm-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;background:var(--bg);}
.lm-input:focus{border-color:var(--accent);background:#fff;}
.lm-input::placeholder{color:#bbb;}
.lm-btns{display:flex;gap:8px;margin-top:20px;}
.lm-btn-cancel{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:var(--gray);font-family:'Noto Sans KR',sans-serif;}
.lm-btn-save{flex:2;padding:10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;background:var(--accent);color:#fff;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
.lm-btn-clear{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:#fff;color:var(--gray);font-family:'Noto Sans KR',sans-serif;}

/* commute — simplified 3-destination */
.c-commute{border-bottom:1px solid var(--border);padding:14px 14px;}
.ct-title-main{font-size:12px;font-weight:600;color:var(--charcoal);margin-bottom:2px;}
.ct-title-sub{font-size:10px;color:var(--gray);font-weight:300;margin-left:6px;}

/* commute tabs v2 */
.ct-tabs2{display:flex;gap:6px;margin-bottom:8px;}
.ct-tab2{flex:1;padding:7px 0;font-size:11px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--gray);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.ct-tab2.on{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
.ct-sub{font-size:10px;color:var(--gray);margin-bottom:8px;}
.ct-panel2{display:none;}
.ct-panel2.on{display:block;}

.ct-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ct-grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.ct3-item{background:var(--bg);border-radius:9px;padding:10px 11px;}
.ct3-dest{font-size:13px;font-weight:700;color:var(--charcoal);margin-bottom:7px;letter-spacing:-.2px;}
.ct3-rows{display:flex;flex-direction:column;gap:5px;}
.ct3-row{display:flex;align-items:center;gap:4px;}
.ct3-label{font-size:10px;color:var(--gray);width:24px;flex-shrink:0;}
.ct3-bus{font-size:12px;font-weight:700;color:var(--blue);}
.ct3-car{font-size:12px;font-weight:700;color:var(--green);}
.ct3-sep{font-size:10px;color:#ccc;}

/* section titles */
.section-title{font-size:11px;font-weight:600;color:var(--charcoal);letter-spacing:.3px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

@media(max-width:480px){
  .ct-grid3{grid-template-columns:1fr;}
  .ct-grid4{grid-template-columns:1fr 1fr;}
  .ct3-dest{font-size:12px;}
  .ct3-bus,.ct3-car{font-size:11px;}
}

/* infra */
.c-infra{border-bottom:1px solid var(--border);padding:11px 13px;}
.infra-title{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:8px;font-weight:500;}
.infra-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.infra-item{background:var(--bg);border-radius:7px;padding:7px 9px;}
.infra-type{font-size:9px;color:var(--gray);margin-bottom:2px;}
.infra-name{font-size:11px;font-weight:600;margin-bottom:2px;}
.infra-dist{font-size:10px;color:var(--green);}
.infra-car{font-size:10px;color:var(--gray);}

/* horae (개발호재) */
.c-horae{border-bottom:1px solid var(--border);padding:11px 13px;}
.horae-title{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:8px;font-weight:500;}
.horae-list{display:flex;flex-direction:column;gap:5px;}
.horae-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--bg);border-radius:7px;}
.horae-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.horae-body{flex:1;}
.horae-name{font-size:11px;font-weight:600;color:var(--charcoal);margin-bottom:1px;}
.horae-desc{font-size:10px;color:var(--gray);line-height:1.5;}
.horae-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:100px;font-weight:600;margin-left:5px;vertical-align:middle;}
.tag-rail{background:#DBEAFE;color:#1E3A5F;}
.tag-dev{background:#D1FAE5;color:#065F46;}
.tag-redev{background:#FEF3C7;color:#78350F;}
.tag-infra{background:#EDE9FE;color:#4C1D95;}

/* star rating */
.c-rating{padding:13px 13px 0;}
.r-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.r-who{font-size:11px;color:var(--gray);width:30px;flex-shrink:0;font-weight:500;}
.r-who.avg{color:var(--charcoal);font-weight:700;}
.stars{display:flex;gap:2px;}
.star{display:inline-block;width:18px;height:18px;cursor:pointer;position:relative;flex-shrink:0;}
.star svg{width:18px;height:18px;pointer-events:none;display:block;}
.avg-stars .star{cursor:default;}
.r-val{font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;color:var(--accent);width:28px;text-align:right;flex-shrink:0;}
.r-val.avg{color:var(--gold);font-size:14px;}
.avg-div{border:none;border-top:1px dashed var(--border);margin:3px 0 9px;}

/* comment */
.c-comment{padding:9px 13px 14px;}
.cm-lbl{font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:6px;}
.cm-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.cm-wrap{display:flex;flex-direction:column;gap:2px;}
.cm-who{font-size:9px;color:var(--gray);font-weight:500;}
textarea.cm-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--charcoal);outline:none;resize:none;transition:border-color .15s;}
textarea.cm-input:focus{border-color:var(--accent);background:#fff;}
textarea.cm-input::placeholder{color:#c5c0ba;}



  .gu-header{padding:8px 2px;}
  .gu-name{font-size:14px;}
}
@media(max-width:640px){
  .c-info{grid-template-columns:1fr 1fr;}
  .ct-grid,.ct-grid-wide{grid-template-columns:1fr 1fr;}
  .infra-grid{grid-template-columns:1fr 1fr;}
  .cm-grid{grid-template-columns:1fr;}
  .map-wrap{height:50vh;}
  .apt-img{height:130px;}
}

/* ── 구별 카드 스타일 ───────────────────────── */
.card{border-top:4px solid var(--card-gu-color, var(--border)) !important;}
.gu-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.3px;margin-bottom:6px;}

.gu-section-label:first-child{margin-top:0;padding-top:6px;}
.gu-section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gu-section-name{font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;color:var(--charcoal);}
.gu-section-count{font-size:11px;color:var(--gray);background:var(--border);padding:2px 8px;border-radius:100px;}
.gu-section-line{flex:1;height:1px;background:var(--border);}

/* ─── 구별 아코디언 섹션 ───────────────────────────────── */
.gu-section {
  margin-bottom: 20px;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
}
.gu-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}
.gu-section-header:hover { opacity: .85; }
.gu-section-header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.gu-section-icon { font-size: 16px; }
.gu-section-name {
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Serif KR', serif;
  color: #fff;
  letter-spacing: -.2px;
}
.gu-section-count {
  font-size: 11px;
  color: rgba(255,255,255,.75);
  background: rgba(255,255,255,.2);
  padding: 2px 8px;
  border-radius: 100px;
}
.gu-section-chevron {
  font-size: 14px;
  color: rgba(255,255,255,.8);
  transition: transform .25s ease;
  flex-shrink: 0;
}
.gu-section.collapsed .gu-section-chevron { transform: rotate(-90deg); }
.gu-section-body {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
  padding: 14px;
  transition: all .25s ease;
}
.gu-section.collapsed .gu-section-body {
  display: none;
}
@media(max-width:680px){
  .gu-section-body { grid-template-columns: 1fr; }
  .gu-section-name { font-size: 14px; }
}

/* 카드 상단 구 색상 바 제거 (섹션 헤더로 대체) */
.card { border-top: none !important; }
</style>
</head>
<body>

<div class="map-wrap">
  <div class="map-title">🏠 재원 & 희영 신혼 자가 후보 단지 16곳</div>
  <div id="naver-map"></div>
  <div class="map-fallback" id="map-fallback">
    <strong>⚠️ 지도 로드 실패</strong>
    <p>HTML에서 <code>YOUR_CLIENT_ID</code>를 네이버 클라우드 Client ID로 교체하세요</p>
  </div>
</div>

<!-- 매물 호가 입력 모달 -->
<div class="listing-modal-bg" id="listing-modal" style="display:none" onclick="if(event.target===this)closeListingModal()">
  <div class="listing-modal">
    <div class="lm-title" id="lm-title">매물 호가 입력</div>
    <div class="lm-sub" id="lm-sub"></div>
    <div class="lm-field">
      <label class="lm-label">최저가 (예: 13.5억)</label>
      <input class="lm-input" id="lm-min" placeholder="예) 13.5억" />
    </div>
    <div class="lm-field">
      <label class="lm-label">최고가 (예: 15억)</label>
      <input class="lm-input" id="lm-max" placeholder="예) 15억" />
    </div>
    <div class="lm-field">
      <label class="lm-label">매물 수</label>
      <input class="lm-input" id="lm-count" placeholder="예) 12" type="number" min="0" />
    </div>
    <div class="lm-btns">
      <button class="lm-btn-cancel" onclick="closeListingModal()">취소</button>
      <button class="lm-btn-clear" onclick="clearListing()">초기화</button>
      <button class="lm-btn-save" onclick="saveListing()">저장</button>
    </div>
  </div>
</div>

<div class="main">
    <h2>후보 단지 비교 <span style="font-size:13px;font-weight:300;color:var(--gray);margin-left:6px;">16개 단지</span></h2>
    <div class="sort-wrap">
      <span>정렬</span>
      <button class="sort-btn" data-s="default" onclick="sortCards('default')">기본순</button>
      <button class="sort-btn on" data-s="rating" onclick="sortCards('rating')">평점 높은순</button>
    </div>
  </div>
  <p class="data-note">※ 가격·학군·인프라 데이터는 KB부동산·호갱노노·나이스지키미 기준 (2025~2026년). 학업성취도는 나이스 학업성취도 공시 기준(보통학력이상 비율). 시세·데이터 수시 변동 — 직접 확인 권장.</p>
  <div class="cards" id="cards"></div>
</div>

<!-- Firebase SDK — 메인 스크립트 직전에 로드 -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ═══════════════════════════════════════════════════════
const APTS = [
  {
    id:'A', name:'목동센트럴아이파크위브', gu:'양천구', year:2020, units:3045,
    lat:37.5257, lng:126.8665,
    img:'https://landthumb-phinf.pstatic.net/20211115_283/land_naver_1636937777133kSORH_JPEG/e3ae96fdcc32c470c9c173424ed48a44.JPG?type=m1024', // ← 네이버 부동산 이미지 URL 붙여넣기

const ratings = {};
APTS.forEach(a => { ratings[a.id] = {jw:0, hy:0}; });
const PTS = '12,2.5 14.8,8.9 21.7,9.8 16.9,14.4 18.2,21.2 12,17.9 5.8,21.2 7.1,14.4 2.3,9.8 9.2,8.9';

function starSVG(f) {
  const on='#F5A623', off='#DDD8D2';
  if(f===1) return `<svg viewBox="0 0 24 24"><polygon points="${PTS}" fill="${on}" stroke="${on}" stroke-width=".4"/></svg>`;
  if(f===.5){const id='h'+(Math.random()*1e6|0);return `<svg viewBox="0 0 24 24"><defs><clipPath id="${id}"><rect x="0" y="0" width="12" height="24"/></clipPath></defs><polygon points="${PTS}" fill="${off}" stroke="${off}" stroke-width=".4"/><polygon points="${PTS}" fill="${on}" stroke="${on}" stroke-width=".4" clip-path="url(#${id})"/></svg>`;}
  return `<svg viewBox="0 0 24 24"><polygon points="${PTS}" fill="${off}" stroke="${off}" stroke-width=".4"/></svg>`;
}

function renderStars(el, val, n) {
  el.innerHTML='';
  for(let i=1;i<=n;i++){
    const f = val>=i?1:val>=i-.5?.5:0;
    const s=document.createElement('span');
    s.className='star'; s.dataset.star=i;
    s.innerHTML=starSVG(f);
    el.appendChild(s);
  }
}

function initStars(el, aptId, who) {
  renderStars(el, 0, 10);
  el.addEventListener('mousemove', e=>{
    const s=e.target.closest('[data-star]'); if(!s) return;
    const i=parseInt(s.dataset.star);
    const r=s.getBoundingClientRect();
    renderStars(el, e.clientX<r.left+r.width/2?i-.5:i, 10);
  });
  el.addEventListener('mouseleave', ()=>renderStars(el, ratings[aptId][who], 10));
  el.addEventListener('click', e=>{
    const s=e.target.closest('[data-star]'); if(!s) return;
    const i=parseInt(s.dataset.star);
    const r=s.getBoundingClientRect();
    const nv=e.clientX<r.left+r.width/2?i-.5:i;
    ratings[aptId][who]=ratings[aptId][who]===nv?0:nv;
    renderStars(el, ratings[aptId][who], 10);
    refreshRating(aptId);
    if(curSort==='rating') sortCards('rating',false);
  });
}

function refreshRating(id) {
  const {jw,hy}=ratings[id];
  const jv=document.getElementById(`v-${id}-jw`);
  const hv=document.getElementById(`v-${id}-hy`);
  const av=document.getElementById(`v-${id}-av`);
  const as=document.getElementById(`s-${id}-av`);
  if(jv) jv.textContent=jw>0?jw.toFixed(1):'-';
  if(hv) hv.textContent=hy>0?hy.toFixed(1):'-';
  const both=jw>0&&hy>0;
  const avg=both?Math.round((jw+hy)*2)/4:(jw||hy||0);
  if(av) av.textContent=(jw>0||hy>0)?avg.toFixed(1):'-';
  if(as) renderStars(as, avg, 10);
  updateRanks();
}

function getAvg(id){const{jw,hy}=ratings[id];if(jw>0&&hy>0)return(jw+hy)/2;return jw||hy||0;}

function updateRanks(){
  APTS.forEach(a=>{
    const c=document.getElementById(`card-${a.id}`);if(!c)return;
    c.classList.remove('r1','r2','r3');
    const b=c.querySelector('.rank-badge');if(b)b.remove();
  });
  [...APTS].filter(a=>getAvg(a.id)>0).sort((a,b)=>getAvg(b.id)-getAvg(a.id)).slice(0,3).forEach((a,i)=>{
    const c=document.getElementById(`card-${a.id}`);if(!c)return;
    c.classList.add('r'+(i+1));
    const b=document.createElement('div');b.className='rank-badge';b.textContent=i+1;c.appendChild(b);
  });
}

// 정렬
// ═══════════════════════════════════════════════════════
let curSort='rating';
function getGuMaxAvg(gu){
  const byGu={};
  APTS.forEach(apt=>{ if(!byGu[apt.gu]) byGu[apt.gu]=[]; byGu[apt.gu].push(apt); });
  const apts = byGu[gu]||[];
  const avgs = apts.map(a=>getAvg(a.id)).filter(v=>v>0);
  return avgs.length ? Math.max(...avgs) : 0;
}

function getSortedGuOrder(){
  // 평점이 하나라도 있으면 구 최고평점 내림차순, 없으면 기본 순서
  const hasAny = APTS.some(a=>getAvg(a.id)>0);
  if(!hasAny) return GU_ORDER;
  return [...GU_ORDER].sort((a,b)=>{
    const ra=getGuMaxAvg(a), rb=getGuMaxAvg(b);
    if(!ra&&!rb) return GU_ORDER.indexOf(a)-GU_ORDER.indexOf(b);
    if(!ra) return 1; if(!rb) return -1;
    return rb-ra;
  });
}

function reorderGuSections(guOrder){
  const wrap = document.getElementById('cards');
  guOrder.forEach(gu=>{
    const sec = document.getElementById(`gu-sec-${gu}`);
    if(sec) wrap.appendChild(sec);
  });
}

function sortCards(type, updBtn=true){
  curSort=type;
  if(updBtn) document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===type));

  const byGu={};
  APTS.forEach(apt=>{ if(!byGu[apt.gu]) byGu[apt.gu]=[]; byGu[apt.gu].push(apt); });

  if(type==='rating'){
    // 전체 평점 순위 계산
    const sorted=[...APTS].sort((a,b)=>{
      const ra=getAvg(a.id),rb=getAvg(b.id);
      if(!ra&&!rb)return 0; if(!ra)return 1; if(!rb)return -1; return rb-ra;
    });
    const rankMap={};
    sorted.forEach((apt,i)=>{ rankMap[apt.id]=i+1; });

    // 구 내부를 평점순 재배치
    GU_ORDER.filter(g=>byGu[g]).forEach(gu=>{
      const body=document.getElementById(`gu-body-${gu}`);
      if(!body) return;
      [...byGu[gu]].sort((a,b)=>{
        const ra=getAvg(a.id),rb=getAvg(b.id);
        if(!ra&&!rb)return 0; if(!ra)return 1; if(!rb)return -1; return rb-ra;
      }).forEach(apt=>{
        const c=document.getElementById(`card-${apt.id}`);
        const ix=c.querySelector(`#idx-${apt.id}`);
        if(ix){
          const avg=getAvg(apt.id);
          if(avg){ ix.textContent=rankMap[apt.id]; ix.classList.remove('no-rank'); }
          else   { ix.textContent=''; ix.classList.add('no-rank'); }
        }
        body.appendChild(c);
      });
    });
    reorderGuSections(getSortedGuOrder());
  } else {
    GU_ORDER.filter(g=>byGu[g]).forEach(gu=>{
      const body=document.getElementById(`gu-body-${gu}`);
      if(!body) return;
      byGu[gu].forEach(apt=>{
        const c=document.getElementById(`card-${apt.id}`);
        const ix=c.querySelector(`#idx-${apt.id}`);
        if(ix){ ix.textContent=''; ix.classList.add('no-rank'); }
        body.appendChild(c);
      });
    });
    reorderGuSections(GU_ORDER);
  }
}

let _lmAptId = null;
let _lmType  = null; // '59' | '84'

function openListingEdit(aptId, type) {
  _lmAptId = aptId;
  _lmType  = type;
  const apt = APTS.find(a => a.id === aptId);
  const field = type === '59' ? apt.listing59 : apt.listing84;
  document.getElementById('lm-title').textContent = `${apt.name} — 매물 호가 입력`;
  document.getElementById('lm-sub').textContent   = `${type === '59' ? '59㎡ (25평형)' : '84㎡ (34평형)'} 현재 매물 호가를 입력하세요`;
  document.getElementById('lm-min').value   = field.min   || '';
  document.getElementById('lm-max').value   = field.max   || '';
  document.getElementById('lm-count').value = field.count || '';
  document.getElementById('listing-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('lm-min').focus(), 50);
}

function closeListingModal() {
  document.getElementById('listing-modal').style.display = 'none';
  _lmAptId = null; _lmType = null;
}

function saveListing() {
  if (!_lmAptId) return;
  const apt = APTS.find(a => a.id === _lmAptId);
  const field = _lmType === '59' ? apt.listing59 : apt.listing84;
  field.min   = document.getElementById('lm-min').value.trim();
  field.max   = document.getElementById('lm-max').value.trim();
  field.count = document.getElementById('lm-count').value.trim();
  renderListingBadge(_lmAptId, _lmType);
  closeListingModal();
}

function clearListing() {
  if (!_lmAptId) return;
  const apt = APTS.find(a => a.id === _lmAptId);
  const field = _lmType === '59' ? apt.listing59 : apt.listing84;
  field.min = field.max = field.count = '';
  renderListingBadge(_lmAptId, _lmType);
  closeListingModal();
}

function renderListingBadge(aptId, type) {
  const apt = APTS.find(a => a.id === aptId);
  const field = type === '59' ? apt.listing59 : apt.listing84;
  const el = document.getElementById(`listing${type}-${aptId}`);
  if (!el) return;
  const hasData = field.min || field.max || field.count;
  if (hasData) {
    el.innerHTML = `<span class="l-min">${field.min||'-'}</span><span class="l-wave">~</span><span class="l-max">${field.max||'-'}</span>${field.count?`<span class="l-count">${field.count}건</span>`:''}<span class="listing-edit-btn" onclick="openListingEdit('${aptId}','${type}')">✏️</span>`;
  } else {
    el.innerHTML = `<span class="l-empty" onclick="openListingEdit('${aptId}','${type}')">+ 입력</span>`;
  }
}

// Enter 키로 저장
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeListingModal();
  if (e.key === 'Enter' && _lmAptId) saveListing();

function initMap(){
  if(typeof naver==='undefined'||typeof naver.maps==='undefined'){
    document.getElementById('map-fallback').style.display='flex';return;
  }
  const bounds=new naver.maps.LatLngBounds();
  APTS.forEach(a=>bounds.extend(new naver.maps.LatLng(a.lat,a.lng)));
  const map=new naver.maps.Map('naver-map',{bounds,mapTypeControl:false,scaleControl:false,logoControl:true,mapDataControl:false});
  const iws=[];
  APTS.forEach((apt,i)=>{
    const marker=new naver.maps.Marker({
      position:new naver.maps.LatLng(apt.lat,apt.lng),map,
      icon:{content:`<div style="background:#1A1A1A;color:#fff;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:500;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.28);cursor:pointer;position:relative;"><span style="color:#F5A623;margin-right:3px;">${i+1}</span>${apt.name}<div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1A1A1A;border-bottom:none;"></div></div>`,anchor:new naver.maps.Point(55,28)},
    });
    const iw=new naver.maps.InfoWindow({
      content:`<div style="padding:13px 15px;font-family:'Noto Sans KR',sans-serif;min-width:185px;border-radius:10px;"><div style="font-size:13px;font-weight:700;margin-bottom:2px;">${apt.name}</div><div style="font-size:10px;color:#888;margin-bottom:6px;">${apt.station}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><div style="background:#F7F4EF;border-radius:6px;padding:6px 8px;"><div style="font-size:9px;color:#888;margin-bottom:2px;">59㎡</div><div style="font-size:13px;font-weight:700;color:#C0622A;">${apt.p59.r}</div></div><div style="background:#F7F4EF;border-radius:6px;padding:6px 8px;"><div style="font-size:9px;color:#888;margin-bottom:2px;">84㎡</div><div style="font-size:13px;font-weight:700;color:#C0622A;">${apt.p84.r}</div></div></div></div>`,
      borderWidth:0,backgroundColor:'#fff',borderRadius:'12px',boxShadow:'0 6px 24px rgba(0,0,0,.14)',pixelOffset:new naver.maps.Point(0,-10),disableAnchor:true,
    });
    iws.push(iw);
    naver.maps.Event.addListener(marker,'click',()=>{iws.forEach((w,j)=>{if(j!==i)w.close();});iw.getMap()?iw.close():iw.open(map,marker);});
  });
}

function showToast(msg) {
  let t = document.getElementById('fb-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'fb-toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(26,26,26,.88);color:#fff;padding:8px 18px;border-radius:100px;font-size:12px;z-index:999;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(8px);';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}

function init(){
  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';

  // 구별로 묶기
  const byGu = {};
  APTS.forEach(apt => { if(!byGu[apt.gu]) byGu[apt.gu]=[]; byGu[apt.gu].push(apt); });

  GU_ORDER.filter(g => byGu[g]).forEach(gu => {

    const icon  = GU_ICONS[gu] || '🏠';
    const apts  = byGu[gu];

    // 섹션 컨테이너
    const section = document.createElement('div');
    section.className = 'gu-section';
    section.id = `gu-sec-${gu}`;

    // 헤더
    const header = document.createElement('div');
    header.className = 'gu-section-header';
    header.style.background = color.bar;
    header.onclick = () => toggleGuSection(gu);
    header.innerHTML = `
      <div class="gu-section-header-left">
        <span class="gu-section-icon">${icon}</span>
        <span class="gu-section-name">${gu}</span>
        <span class="gu-section-count">${apts.length}개 단지</span>
      </div>
      <span class="gu-section-chevron">▼</span>
    `;

    // 카드 바디
    const body = document.createElement('div');
    body.className = 'gu-section-body';
    body.style.background = color.light;
    body.id = `gu-body-${gu}`;

    apts.forEach(apt => {
      const card = buildCard(apt, 0);
      card.style.background = '#fff';
      body.appendChild(card);
      // 별점 초기화
      initStars(card.querySelector(`#s-${apt.id}-jw`), apt.id, 'jw');
      initStars(card.querySelector(`#s-${apt.id}-hy`), apt.id, 'hy');
      const avEl = card.querySelector(`#s-${apt.id}-av`);
      if(avEl) renderStars(avEl, 0, 10);
    });

    section.appendChild(header);
    section.appendChild(body);
    wrap.appendChild(section);
  });
  // ── 한줄평 자동저장 이벤트 연결 ──────────────────────
  APTS.forEach(apt => {
    const card = document.getElementById(`card-${apt.id}`);
    if (!card) return;
    const textareas = card.querySelectorAll('textarea.cm-input');
    const whos = ['jw', 'hy'];
    textareas.forEach((ta, i) => {
      const who = whos[i];
      let timer;
      ta.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          saveComment(apt.id, who, ta.value);
          showToast('💾 저장됨');
        }, 800); // 0.8초 후 자동 저장
      });
    });
  });

  // ── Firebase에서 데이터 불러오기 (실시간) ────────────
  db.ref(ROOT).on('value', snapshot => {
    const data = snapshot.val() || {};

    // 별점 복원
    if (data.ratings) {
      Object.entries(data.ratings).forEach(([id, val]) => {
        if (!ratings[id]) return;
        ratings[id].jw = val.jw || 0;
        ratings[id].hy = val.hy || 0;
        // UI 갱신
        const jwEl = document.getElementById(`s-${id}-jw`);
        const hyEl = document.getElementById(`s-${id}-hy`);
        if (jwEl) renderStars(jwEl, ratings[id].jw, 10);
        if (hyEl) renderStars(hyEl, ratings[id].hy, 10);
        _origRefreshRating(id); // 평균 갱신
      });
      updateRanks();
      if (curSort === 'rating') sortCards('rating', false);
    }

    // 매물 호가 복원
    if (data.listings) {
      Object.entries(data.listings).forEach(([id, val]) => {
        const apt = APTS.find(a => a.id === id);
        if (!apt) return;
        if (val.listing59) {
          apt.listing59 = val.listing59;
          renderListingBadge(id, '59');
        }
        if (val.listing84) {
          apt.listing84 = val.listing84;
          renderListingBadge(id, '84');
        }
      });
    }

    // 한줄평 복원
    if (data.comments) {
      Object.entries(data.comments).forEach(([id, val]) => {
        const card = document.getElementById(`card-${id}`);
        if (!card) return;
        const textareas = card.querySelectorAll('textarea.cm-input');
        if (val.jw !== undefined && textareas[0]) textareas[0].value = val.jw;
        if (val.hy !== undefined && textareas[1]) textareas[1].value = val.hy;
      });
    }
  });
}

function getRecentMonths(n) {
  const months = [];
  const now = new Date();
  for (let i = 0; i < n; i++) {
    let y = now.getFullYear(), m = now.getMonth() + 1 - i;
    if (m <= 0) { m += 12; y--; }
    months.push(y + String(m).padStart(2,'0'));
  }
  return months;
}

async function fetchAptTrades(lawdCd, dealYmd, aptNmKeyword) {
  const params = new URLSearchParams({
    serviceKey: MOLIT_KEY,
    LAWD_CD: lawdCd,
    DEAL_YMD: dealYmd,
    pageNo: 1,
    numOfRows: 100
  });
  const url = MOLIT_BASE + '?' + params;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = [...xml.querySelectorAll('item')];
    return items
      .filter(item => (item.querySelector('aptNm')?.textContent||'').trim().includes(aptNmKeyword))
      .map(item => ({
        area:   parseFloat(item.querySelector('excluUseAr')?.textContent||0),
        amount: parseInt((item.querySelector('dealAmount')?.textContent||'0').replace(/,/g,'')),
        year:   item.querySelector('dealYear')?.textContent||'',
        month:  item.querySelector('dealMonth')?.textContent||'',
      }));
  } catch(e) { return []; }
}

function formatPrice(amount, year, month) {
  const uk = Math.floor(amount / 10000);
  const chun = Math.round((amount % 10000) / 1000);
  let str = uk > 0 ? uk + '억' : '';
  if (chun > 0) str += chun + '천';
  return str + ' (' + year + '.' + month + ')';
}

function getLatestPrice(trades, areaMin, areaMax) {
  const filtered = trades
    .filter(t => t.area >= areaMin && t.area <= areaMax && t.amount > 0)
    .sort((a,b) => (b.year+b.month).localeCompare(a.year+a.month));
  if (!filtered.length) return null;
  const t = filtered[0];
  return formatPrice(t.amount, t.year, t.month);
}

async function loadAllTradePrices() {
  const months = getRecentMonths(5);
  showToast('📊 실거래가 로딩 중...');
  for (const [aptId, info] of Object.entries(APT_API_INFO)) {
    let allTrades = [];
    for (const ym of months) {
      const trades = await fetchAptTrades(info.lawdCd, ym, info.aptNm);
      allTrades = allTrades.concat(trades);
      if (allTrades.length >= 3) break;
    }
    if (!allTrades.length) continue;
    const p59 = getLatestPrice(allTrades, info.area59[0], info.area59[1]);
    const p84 = getLatestPrice(allTrades, info.area84[0], info.area84[1]);
    const card = document.getElementById('card-' + aptId);
    if (!card) continue;
    card.querySelectorAll('.p-block').forEach(block => {
      const type = block.querySelector('.p-type')?.textContent || '';
      const row = [...block.querySelectorAll('.p-row')].find(r =>
        r.querySelector('span')?.textContent === '최근 실거래'
      );
      if (!row) return;
      const valEl = row.querySelectorAll('span')[1];
      if (!valEl) return;
      if (type.includes('59') && p59) valEl.textContent = p59;
      if (type.includes('84') && p84) valEl.textContent = p84;
    });
  }
  showToast('✅ 실거래가 업데이트 완료 (국토교통부)');
}
